<!DOCTYPE html>
<html lang="es-mx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error del servidor — Sistema Escolar</title>
    <!-- Ruta estática absoluta a propósito: en un error 500 no se puede
         garantizar que el motor de plantillas resuelva {% static %} normalmente. -->
    <link rel="stylesheet" href="/static/css/design-system.css">
</head>
<body>
<div class="auth-shell">
    <div class="panel-bracket" style="max-width: 440px; text-align: center;">
        <span class="u-eyebrow" style="color: var(--danger);">Error 500</span>
        <h1 style="font-size: 1.4rem; margin-bottom: var(--sp-3);">Algo falló de nuestro lado</h1>
        <p style="color: var(--ink-dim); margin-bottom: var(--sp-5);">
            El sistema encontró un problema inesperado. Ya quedó registrado; intentá de nuevo en unos minutos.
        </p>
        <a href="/" class="btn btn-primary">Volver al inicio</a>
    </div>
</div>
</body>
</html>
