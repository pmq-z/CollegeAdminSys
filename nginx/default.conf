# Nginx es el único punto de entrada público del stack (ver docker-compose.yml):
# los contenedores db/redis/web no exponen puertos al host, solo a la red interna.

upstream sistema_escolar_web {
    # 'web' se resuelve por DNS interno de Podman/Compose al contenedor del mismo nombre.
    server web:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Compresión para texto/JSON/CSS: costo casi nulo, reduce bytes transferidos.
    gzip on;
    gzip_types text/css application/javascript application/json text/plain;
    gzip_min_length 512;

    # Estáticos servidos directo por Nginx: evita que cada request a un .css
    # o .svg tenga que pasar por Gunicorn/Django innecesariamente.
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /healthz/ {
        proxy_pass http://sistema_escolar_web;
        access_log off;
    }

    location / {
        proxy_pass http://sistema_escolar_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Django usa esta cabecera (ver SECURE_PROXY_SSL_HEADER en settings.py)
        # para saber si la conexión original era HTTPS aunque acá adentro sea HTTP.
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}
